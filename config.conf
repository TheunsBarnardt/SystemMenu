# System Menu Configuration
# Format:
#   GROUP=<Group Name>
#   ACTION=<Button Label>|<shell command>
#
# Blank lines and lines starting with # are ignored.

GROUP=MongoDB
ACTION=Start MongoDB|sudo systemctl start mongod
ACTION=Check Status|sudo systemctl status mongod
ACTION=Stop MongoDB|sudo systemctl stop mongod
ACTION=Restart MongoDB|sudo systemctl restart mongod
ACTION=Enable on Boot|sudo systemctl enable mongod
ACTION=Disable on Boot|sudo systemctl disable mongod

GROUP=Nginx
ACTION=Start Nginx|sudo systemctl start nginx
ACTION=Check Status|sudo systemctl status nginx
ACTION=Stop Nginx|sudo systemctl stop nginx
ACTION=Restart Nginx|sudo systemctl restart nginx
ACTION=Reload Config|sudo systemctl reload nginx

GROUP=System
ACTION=Disk Usage|df -h
ACTION=Memory Usage|free -h
ACTION=Running Services|systemctl list-units --type=service --state=running
ACTION=System Uptime|uptime
ACTION=Who is Logged In|who
